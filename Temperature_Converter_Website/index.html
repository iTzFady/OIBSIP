<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h1>Temperature Converter</h1>
      </div>

      <div class="unit-group" role="group" aria-label="Input unit">
        <button class="unit-btn active" data-unit="C" onclick="selectUnit('C')">
          <span class="symbol">°C</span>
          <span class="label">Celsius</span>
        </button>
        <button class="unit-btn" data-unit="F" onclick="selectUnit('F')">
          <span class="symbol">°F</span>
          <span class="label">Fahrenheit</span>
        </button>
        <button class="unit-btn" data-unit="K" onclick="selectUnit('K')">
          <span class="symbol">K</span>
          <span class="label">Kelvin</span>
        </button>
      </div>

      <div class="input-wrap">
        <label for="tempInput">Degrees</label>
        <input
          type="number"
          id="tempInput"
          placeholder="0"
          step="any"
          oninput="clearError()"
          onkeydown="handleKey(event)"
        />
        <span class="input-unit-badge" id="inputBadge">°C</span>
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <button class="convert-btn" onclick="convert()">Convert</button>

      <div class="result-area" id="resultArea">
        <p class="result-label">Result</p>
        <div id="resultContent">
          <p class="placeholder-text">Enter a value and press Convert</p>
        </div>
      </div>
    </div>
  </body>
</html>
