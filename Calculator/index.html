<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display-section">
          <div class="input-display" id="inputDisplay">0</div>
          <div class="result-display" id="resultDisplay">0</div>
        </div>

        <div class="buttons-grid">
          <!-- First Row -->
          <button class="btn function-btn" id="openParen">(</button>
          <button class="btn function-btn" id="closeParen">)</button>
          <button class="btn function-btn" id="ansBtn">ans</button>
          <button class="btn function-btn" id="delBtn">del</button>
          <button class="btn function-btn" id="clearBtn">clear</button>

          <!-- Second Row -->
          <button class="btn number-btn" id="num7">7</button>
          <button class="btn number-btn" id="num8">8</button>
          <button class="btn number-btn" id="num9">9</button>
          <button class="btn operator-btn" id="percent">%</button>
          <button class="btn operator-btn" id="sqrt">√</button>

          <!-- Third Row -->
          <button class="btn number-btn" id="num4">4</button>
          <button class="btn number-btn" id="num5">5</button>
          <button class="btn number-btn" id="num6">6</button>
          <button class="btn operator-btn" id="multiply">×</button>
          <button class="btn operator-btn" id="divide">÷</button>

          <!-- Fourth Row -->
          <button class="btn number-btn" id="num1">1</button>
          <button class="btn number-btn" id="num2">2</button>
          <button class="btn number-btn" id="num3">3</button>
          <button class="btn operator-btn" id="plus">+</button>
          <button class="btn operator-btn" id="minus">−</button>

          <!-- Fifth Row -->
          <button class="btn number-btn" id="decimal">.</button>
          <button class="btn number-btn" id="num0">0</button>
          <button class="btn operator-btn" id="power">±</button>
          <button class="btn enter-btn" id="enterBtn">ENTER</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
